<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHEZAR | تشيزار</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Playfair+Display:ital,wght@1,900&display=swap');
        :root { --accent: #ff6600; --dark: #0f0f0f; --white: #ffffff; }

        body { font-family: 'Cairo', sans-serif; margin: 0; background: #ffffff; color: var(--dark); overflow-x: hidden; position: relative; }

        /* اللوقو الخلفي (واضح واحترافي) */
        .bg-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 85%; background: url('https://i.ibb.co/6Rh4dh4p/IMG-0927.png') no-repeat center;
            background-size: contain; opacity: 0.18; z-index: -2; pointer-events: none;
        }

        header {
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9);
            border-bottom: 1px solid #eee; height: 80px; backdrop-filter: blur(20px);
        }

        .brand { display: flex; align-items: center; cursor: pointer; gap: 10px; }
        .brand-img { height: 50px; border-radius: 50%; }
        .brand-text { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; letter-spacing: 2px; }

        .cart-btn { background: var(--dark); color: white; padding: 10px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; }

        .welcome-hero { padding: 50px 10% 20px; text-align: center; }
        .welcome-hero h1 { font-size: 32px; font-weight: 900; margin: 0; }
        .welcome-hero h1 span { color: var(--accent); }
        .welcome-hero p { color: #666; font-size: 16px; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 20px 5% 100px; }

        .card { background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(8px); border-radius: 30px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        .slider { width: 100%; aspect-ratio: 1/1.1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; scroll-snap-align: start; }

        .info { padding: 20px; text-align: center; }
        .price { font-size: 26px; font-weight: 900; color: var(--accent); margin-bottom: 15px; display: block; }
        
        .field { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; background: #fff; }
        .manual-input { display: none; border-color: var(--accent); background: #fffaf5; }
        
        .buy-btn { background: var(--dark); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 16px; }

        .chat-box { background: rgba(255,255,255,0.5); padding: 15px; border-top: 1px dashed #eee; }
        .chat-history { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; font-size: 13px; max-width: 85%; }
        .msg.u { background: #eee; align-self: flex-start; }
        .msg.a { background: #fff5eb; border-right: 3px solid var(--accent); align-self: flex-end; font-weight: bold; }

        .panel { position: fixed; inset: 0; background: white; z-index: 2000; display: none; padding: 40px 8%; overflow-y: auto; }
        .panel.active { display: block; }
        .close-link { color: var(--accent); cursor: pointer; font-weight: 900; margin-bottom: 25px; display: block; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; background: #f0f0f0; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--dark); color: white; }

        .admin-card { border: 1px solid #eee; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .btn-edit { background: #007bff; color: white; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; margin-left: 5px; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body onload="init()">

    <div class="bg-watermark"></div>

    <header>
        <div class="brand" onclick="openAdmin()">
            <img src="https://i.ibb.co/6Rh4dh4p/IMG-0927.png" class="brand-img">
            <div class="brand-text">CHEZAR</div>
        </div>
        <div class="cart-btn" onclick="openP('cart')">السلة (<span id="cartNum">0</span>)</div>
    </header>

    <section class="welcome-hero">
        <h1>مرحباً بكِ في <span>تشيزار</span> ✨</h1>
        <p>وجهتكِ الأولى للأناقة.. تسوقي أرقى الموديلات بخصوصية تامة.</p>
    </section>

    <main class="grid" id="mainGrid"></main>

    <div id="adminPanel" class="panel">
        <span class="close-link" onclick="openP('admin')">← إغلاق</span>
        <div class="tabs">
            <button id="bt1" class="tab-btn active" onclick="tab(1)">إضافة / تعديل</button>
            <button id="bt2" class="tab-btn" onclick="tab(2)">المخزون والرسائل</button>
        </div>
        <div id="secAdd">
            <input type="hidden" id="editId">
            <select id="pType" class="field"><option value="shoe">أحذية</option><option value="bag">حقائب</option></select>
            <input type="text" id="pName" class="field" placeholder="اسم الموديل">
            <input type="number" id="pPrice" class="field" placeholder="السعر د.ل">
            <input type="text" id="pUrl1" class="field" placeholder="رابط الصورة 1">
            <input type="text" id="pUrl2" class="field" placeholder="رابط الصورة 2">
            <button id="saveBtn" class="buy-btn" onclick="save()" style="background:var(--accent)">نشر المنتج</button>
        </div>
        <div id="secInv" style="display:none"><div id="admList"></div></div>
    </div>

    <div id="cartPanel" class="panel">
        <span class="close-link" onclick="openP('cart')">← العودة</span>
        <div id="cartList"></div>
        <div style="background:#f9f9f9; padding:20px; border-radius:20px; margin-top:20px;">
            <input type="text" id="uName" class="field" placeholder="الاسم الكريم">
            <input type="tel" id="uPhone" class="field" placeholder="رقم الهاتف">
            <select id="uCity" class="field" onchange="document.getElementById('manCity').style.display=(this.value=='other'?'block':'none')">
                <option>بنغازي</option><option>طرابلس</option><option value="other">مدينة أخرى (يدوي)</option>
            </select>
            <input type="text" id="manCity" class="field manual-input" placeholder="اكتبي منطقتك هنا">
            <select id="uPay" class="field" onchange="document.getElementById('manPay').style.display=(this.value=='other'?'block':'none')">
                <option>كاش</option><option>إدفع لي</option><option>موبي كاش</option><option>يسر باي</option><option>سداد</option><option value="other">يدوي</option>
            </select>
            <input type="text" id="manPay" class="field manual-input" placeholder="طريقة الدفع">
        </div>
        <div style="font-size: 32px; font-weight: 900; margin: 30px 0; text-align: center;">الإجمالي: <span id="sumTotal">0</span> د.ل</div>
        <button class="buy-btn" style="background:#25d366;" onclick="checkout()">تأكيد واتساب</button>
    </div>

    <script>
        let db = []; let cart = [];
        const PRIV_ID = localStorage.getItem('CH_ULTRA_KEY') || 'K-' + Math.random().toString(36).substr(2, 10);
        localStorage.setItem('CH_ULTRA_KEY', PRIV_ID);

        function openP(id) { document.getElementById(id + 'Panel').classList.toggle('active'); }
        function openAdmin() { if(prompt("الرمز:") === "1234") { openP('admin'); tab(1); } }
        
        function tab(n) {
            document.getElementById('secAdd').style.display = n==1?'block':'none';
            document.getElementById('secInv').style.display = n==2?'block':'none';
            document.getElementById('bt1').className = n==1?'tab-btn active':'tab-btn';
            document.getElementById('bt2').className = n==2?'tab-btn active':'tab-btn';
            if(n==2) renderAdmin();
        }

        function save() {
            const id = document.getElementById('editId').value;
            const p = { 
                id: id ? Number(id) : Date.now(), 
                type: document.getElementById('pType').value, 
                name: document.getElementById('pName').value, 
                price: document.getElementById('pPrice').value, 
                url1: document.getElementById('pUrl1').value, 
                url2: document.getElementById('pUrl2').value, 
                chat: id ? db.find(x => x.id == id).chat : [] 
            };
            if(id) { const i = db.findIndex(x => x.id == id); db[i] = p; } else { db.push(p); }
            localStorage.setItem('CH_ULTRA_DB', JSON.stringify(db));
            location.reload();
        }

        function init() {
            const data = localStorage.getItem('CH_ULTRA_DB');
            if(data) db = JSON.parse(data);
            renderStore();
        }

        function renderStore() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = db.map(p => {
                const myChat = (p.chat || []).filter(m => m.uid === PRIV_ID);
                return `
                <div class="card">
                    <div class="slider"><img src="${p.url1}">${p.url2 ? `<img src="${p.url2}">` : ''}</div>
                    <div class="info">
                        <h3>${p.name}</h3><span class="price">${p.price} د.ل</span>
                        <select id="col-${p.id}" class="field" onchange="document.getElementById('mCol-${p.id}').style.display=(this.value=='other'?'block':'none')">
                            <option value="">اللون</option><option>أسود</option><option>أبيض</option><option value="other">يدوي</option>
                        </select>
                        <input type="text" id="mCol-${p.id}" class="field manual-input" placeholder="اللون المطلوب">
                        ${p.type=='shoe'?`<select id="sz-${p.id}" class="field"><option value="">المقاس</option><option>37</option><option>38</option><option>39</option><option>40</option></select>`:''}
                        <button class="buy-btn" onclick="addToCart(${p.id})">أضف للسلة</button>
                    </div>
                    <div class="chat-box">
                        <div class="chat-history">${myChat.map(m=>`<div class="msg u">${m.q}</div>${m.a?`<div class="msg a">✨ الرد: ${m.a}</div>`:''}`).join('')}</div>
                        <div style="display:flex; gap:5px;"><input type="text" id="in-${p.id}" class="field" style="margin:0" placeholder="اسألي هنا..."><button onclick="sendQ(${p.id})" style="background:var(--accent); color:white; border:none; padding:0 10px; border-radius:10px; cursor:pointer;">إرسال</button></div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderAdmin() {
            const list = document.getElementById('admList');
            list.innerHTML = db.map(p => `
                <div class="admin-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${p.name}</b>
                        <div>
                            <button class="btn-edit" onclick="editItem(${p.id})">تعديل</button>
                            <button class="btn-del" onclick="delItem(${p.id})">حذف</button>
                        </div>
                    </div>
                    <hr>
                    ${(p.chat || []).filter(m=>m.a==="").map((m,i)=>`
                        <div style="font-size:12px; background:#f9f9f9; padding:5px; margin-top:5px; border-radius:8px;">
                            ${m.q} <input type="text" id="ans-${p.id}-${i}" placeholder="الرد السري..">
                            <button onclick="reply(${p.id},${i})">رد</button>
                        </div>
                    `).join('')}
                </div>`).join('');
        }

        function editItem(id) {
            const p = db.find(x => x.id == id);
            document.getElementById('editId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pUrl1').value = p.url1;
            document.getElementById('pUrl2').value = p.url2;
            document.getElementById('pType').value = p.type;
            document.getElementById('saveBtn').innerText = "تحديث المنتج";
            tab(1);
        }

        function reply(pId, i) {
            const p = db.find(x=>x.id==pId); const pending = p.chat.filter(m=>m.a==="");
            pending[i].a = document.getElementById(`ans-${pId}-${i}`).value;
            localStorage.setItem('CH_ULTRA_DB', JSON.stringify(db)); renderAdmin(); renderStore();
        }

        function addToCart(id) {
            const p = db.find(x=>x.id==id);
            let c = document.getElementById('col-'+id).value; if(c=='other') c=document.getElementById('mCol-'+id).value;
            let s = p.type=='shoe'?document.getElementById('sz-'+id).value:'';
            if(!c) return alert("اختر اللون");
            cart.push({...p, c, s}); document.getElementById('cartNum').innerText=cart.length; 
            const total = cart.reduce((a,b)=>a+Number(b.price),0); document.getElementById('sumTotal').innerText=total;
            document.getElementById('cartList').innerHTML = cart.map(x=>`<div>${x.name} (${x.c}) - ${x.price} د.ل</div>`).join('');
            openP('cart');
        }

        function delItem(id) { if(confirm("حذف؟")) { db=db.filter(x=>x.id!=id); localStorage.setItem('CH_ULTRA_DB', JSON.stringify(db)); renderAdmin(); renderStore(); } }
        function sendQ(id) {
            const q = document.getElementById('in-'+id).value; if(!q) return;
            db.find(x=>x.id==id).chat.push({uid:PRIV_ID, q, a:""});
            localStorage.setItem('CH_ULTRA_DB', JSON.stringify(db)); renderStore();
        }
        function checkout() { 
            const n = document.getElementById('uName').value;
            const ph = document.getElementById('uPhone').value;
            if(!n || !ph || cart.length == 0) return alert("أكملي البيانات");
            const msg = `*طلب جديد من CHEZAR*\nالاسم: ${n}\nالطلبات:\n` + cart.map(x=>`- ${x.name} (${x.c})`).join('\n') + `\nإجمالي: ${document.getElementById('sumTotal').innerText} د.ل`;
            window.location.href = "https://wa.me/2189XXXXXXXX?text=" + encodeURIComponent(msg);
        }
    </script>
</body>
</html>
